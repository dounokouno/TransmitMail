{include:header.html}
<div id="content">
    <div class="container">
        <div class="section">
            <h2>入力内容の確認</h2>
            <p>以下の内容でよろしければ、ページ下部の送信ボタンを押してください。<br>
                誤りがある場合は、前画面に戻って再度ご入力ください。</p>
            <table width="100%" class="alpha">
                {loop:$params}
                <tr>
                    <th width="300">{$params[].key}&nbsp;</th>
                    <td>{$params[].value.nl2br}&nbsp;</td>
                </tr>
                {/loop:$params}
                {loop:$files}
                <tr>
                    <th>{$files[].key}&nbsp;</th>
                    <td>{$files[].name}<br>
                        <!-- TODO: php ファイル名を動的にする -->
                        <img src="index.test.php?file={$files[].tmp_name}" width="300"><br>
                        <a href="index.test.php?file={$files[].tmp_name}" target="_blank" class="external">画像を別ウィンドウで開く</a></td>
                </tr>
                {/loop:$files}
            </table>
            <div class="center">
                <!-- TODO: action 先を動的にする -->
                <form method="post" action="index.test.php" class="inline">
                    {$hiddens}
                    <input type="hidden" name="page_name" value="input">
                    <input type="submit" value="入力画面に戻る">
                </form>
                &nbsp;
                <!-- TODO: action 先を動的にする -->
                <form method="post" action="index.test.php" class="inline">
                    {$hiddens}
                    <input type="hidden" name="page_name" value="finish">
                    <input type="submit" value="送信する">
                </form>
            </div>
        </div>
    </div>
</div>
{include:footer.html}
