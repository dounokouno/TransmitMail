x-php-base: &php-base
  volumes:
    - .:/app
  working_dir: /app
  networks:
    - transmitmail_network
  command: ["php", "-S", "0.0.0.0:8000"]

x-php-build-base: &php-build-base
  context: .
  dockerfile: docker/Dockerfile.php

services:
  php72:
    <<: *php-base
    ports:
      - "8072:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 7.2-cli
    environment:
      COMPOSER: environments/php72/composer.json
      COMPOSER_VENDOR_DIR: environments/php72/vendor
      # phpunit がタイムアウトする場合に設定する
      # COMPOSER_PROCESS_TIMEOUT: 1200
  php73:
    <<: *php-base
    ports:
      - "8073:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 7.3-cli
    environment:
      COMPOSER: environments/php73/composer.json
      COMPOSER_VENDOR_DIR: environments/php73/vendor
  php74:
    <<: *php-base
    ports:
      - "8074:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 7.4-cli
    environment:
      COMPOSER: environments/php74/composer.json
      COMPOSER_VENDOR_DIR: environments/php74/vendor
  php80:
    <<: *php-base
    ports:
      - "8080:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 8.0-cli
    environment:
      COMPOSER: environments/php80/composer.json
      COMPOSER_VENDOR_DIR: environments/php80/vendor
  php81:
    <<: *php-base
    ports:
      - "8081:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 8.1-cli
    environment:
      COMPOSER: environments/php81/composer.json
      COMPOSER_VENDOR_DIR: environments/php81/vendor
  php82:
    <<: *php-base
    ports:
      - "8082:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 8.2-cli
    environment:
      COMPOSER: environments/php82/composer.json
      COMPOSER_VENDOR_DIR: environments/php82/vendor
  php83:
    <<: *php-base
    ports:
      - "8083:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 8.3-cli
    environment:
      COMPOSER: environments/php83/composer.json
      COMPOSER_VENDOR_DIR: environments/php83/vendor
  php84:
    <<: *php-base
    ports:
      - "8084:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 8.4-cli
    environment:
      COMPOSER: environments/php84/composer.json
      COMPOSER_VENDOR_DIR: environments/php84/vendor
  php85:
    <<: *php-base
    ports:
      - "8085:8000"
    build:
      <<: *php-build-base
      args:
        PHP_VERSION: 8.5-cli
    environment:
      COMPOSER: environments/php85/composer.json
      COMPOSER_VENDOR_DIR: environments/php85/vendor

networks:
  transmitmail_network:
